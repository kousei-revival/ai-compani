<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shutdown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #121212;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
  }
  .container { max-width: 480px; width: 100%; }
  h1 { font-size: 1.4rem; margin-bottom: 32px; color: #888; font-weight: 400; }
  .item {
    display: flex;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid #222;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.3s;
  }
  .item.checked { opacity: 0.35; }
  .item.checked .label { text-decoration: line-through; }
  .checkbox {
    width: 24px;
    height: 24px;
    border: 2px solid #444;
    border-radius: 6px;
    margin-right: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .item.checked .checkbox {
    background: #4a8a4a;
    border-color: #4a8a4a;
  }
  .checkmark { display: none; font-size: 14px; }
  .item.checked .checkmark { display: block; }
  .label { font-size: 1.1rem; line-height: 1.4; }
  .schedule {
    margin-top: 40px;
    padding: 20px;
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 12px;
  }
  .schedule h2 { font-size: 0.9rem; color: #666; margin-bottom: 12px; font-weight: 400; }
  .schedule li { list-style: none; padding: 4px 0; font-size: 0.95rem; color: #aaa; }
  .schedule li::before { content: "- "; color: #444; }
  .message {
    margin-top: 40px;
    font-size: 0.9rem;
    color: #666;
    line-height: 1.6;
  }
  .complete {
    display: none;
    margin-top: 40px;
    text-align: center;
    padding: 20px 0;
  }
  .complete.show { display: block; }
  .complete .moon { font-size: 2.5rem; margin-bottom: 12px; }
  .complete .text { font-size: 1.1rem; color: #888; }
</style>
</head>
<body>
<div class="container">
  <h1>Shutdown</h1>
  <div id="checklist"></div>
  <div class="schedule">
    <h2>明日の予定</h2>
    <ul id="schedule"></ul>
  </div>
  <div class="message" id="message"></div>
  <div class="complete" id="complete">
    <div class="moon">🌙</div>
    <div class="text">おやすみ</div>
  </div>
</div>
<script>
const DATA = {
  items: ["{{ITEMS}}"],
  schedule: ["{{SCHEDULE}}"],
  message: "{{MESSAGE}}",
};

const checklist = document.getElementById("checklist");
const complete = document.getElementById("complete");

DATA.items.forEach(text => {
  const el = document.createElement("div");
  el.className = "item";
  el.innerHTML = `<div class="checkbox"><span class="checkmark">&#10003;</span></div><span class="label">${text}</span>`;
  el.addEventListener("click", () => {
    el.classList.toggle("checked");
    const all = document.querySelectorAll(".item");
    const checked = document.querySelectorAll(".item.checked");
    complete.classList.toggle("show", all.length === checked.length);
  });
  checklist.appendChild(el);
});

const scheduleEl = document.getElementById("schedule");
DATA.schedule.forEach(s => {
  const li = document.createElement("li");
  li.textContent = s;
  scheduleEl.appendChild(li);
});

document.getElementById("message").textContent = DATA.message;
</script>
</body>
</html>
